<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CludenateF – AI Chat Platform</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-icon">⚡</div>
    <h1>CludenateF</h1>
    <p>AI Platform Serba Bisa</p>
  </div>
  <div class="auth-tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Masuk</button>
    <button class="tab-btn" onclick="switchTab('register')">Daftar</button>
  </div>
  <div id="login-form" class="auth-form">
    <input type="text" id="login-username" placeholder="Username" autocomplete="off">
    <input type="password" id="login-password" placeholder="Password">
    <button class="btn-primary" onclick="doLogin()">Masuk</button>
    <div id="login-error" class="error-msg"></div>
  </div>
  <div id="register-form" class="auth-form hidden">
    <input type="text" id="reg-username" placeholder="Username" autocomplete="off">
    <input type="password" id="reg-password" placeholder="Password">
    <input type="password" id="reg-confirm" placeholder="Konfirmasi Password">
    <button class="btn-primary" onclick="doRegister()">Daftar Sekarang</button>
    <div id="reg-error" class="error-msg"></div>
  </div>
  <div class="apk-hint">Ketik <code>/apk</code> di chat untuk download APK</div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
